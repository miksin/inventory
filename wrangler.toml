name = "inventory"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "inventory-db"
database_id = "local-dev"

[[kv_namespaces]]
binding = "SESSIONS"
id = "sessions-local"

[[kv_namespaces]]
binding = "CACHE"
id = "cache-local"
